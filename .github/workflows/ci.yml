name: CI Pipeline

on:
  pull_request:


permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:

  build:
    needs: [test, sonar]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build Docker image
        run: docker build -t apigetaway:${{ github.sha }} .

      - name: Docker tag
        run: |
          docker tag apigetaway:${{ github.sha }} ghcr.io/absolute-in-doubt/apigtw:latest
          docker tag apigetaway:${{ github.sha }} ghcr.io/absolute-in-doubt/apigtw:${{ github.sha }}

      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker push
        run: |
          docker push ghcr.io/absolute-in-doubt/apigtw:latest
          docker push ghcr.io/absolute-in-doubt/apigtw:${{ github.sha }}