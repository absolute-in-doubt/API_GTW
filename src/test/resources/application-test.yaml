spring:
  application:
    name: apigateway
  cloud:
    gateway:
      httpserver:
        wiretap: false
      httpclient:
        wiretap: false
      routes:
        - id: user-service
          order: 10
          uri: http://userservice:8080
          predicates:
            - Path=/api/v1/users/**,/api/v1/cards/**
        - id: auth-service
          order: 2
          uri: http://authservice:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: order-service
          order: 1
          uri: http://orderservice:8082
          predicates:
            - Path=/api/v1/orders/**,/api/v1/users/**/orders
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://authservice:8081/.well-known/jwks

application:
  security:
    publicPaths:
      - /api/v1/auth/login
      - /api/v1/auth/register

server:
  port: 8083

logging:
  level:
    org.springframework.cloud.gateway: WARN
    org.springframework.http.server.reactive: WARN
    org.springframework.web.reactive: WARN
    org.springframework.boot.autoconfigure.web: WARN
    reactor.netty: WARN
