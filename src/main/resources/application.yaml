spring:
  application:
    name: apigateway
  cloud:
    gateway:
      httpserver:
        wiretap: false
      httpclient:
        wiretap: false
      routes:
        - id: user-service
          order: 10
          uri: ${USER_SERVICE_BASE_URL}
          predicates:
            - Path=/api/v1/users/**,/api/v1/cards/**
        - id: auth-service
          order: 2
          uri: ${AUTH_SERVICE_BASE_URL}
          predicates:
            - Path=/api/v1/auth/**
        - id: order-service
          order: 1
          uri: ${ORDER_SERVICE_BASE_URL}
          predicates:
            - Path=/api/v1/orders/**,/api/v1/users/**/orders
  security:
    publicPaths:
      - /api/v1/auth/login
      - /api/v1/auth/register
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URL}

server:
  port: 8083

logging:
  level:
    org.springframework.cloud.getaway: WARN
    org.springframework.http.server.reactive: WARN
    org.springframework.web.reactive: WARN
    org.springframework.boot.autoconfigure.web: WARN
    reactor.netty: WARN
