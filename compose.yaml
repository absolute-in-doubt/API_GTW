services:
  app:
    build: .
    env_file:
      - env/apigateway.env
    ports:
      - "8083:8083"
    depends_on:
      - orderservice



  orderservice:
    image: 'ghcr.io/absolute-in-doubt/ordrsvc:latest'
    pull_policy: always
    env_file:
      - env/orderservice.env
    ports:
      - "8082:8082"
    depends_on:
      - postgres-3
      - authservice
      - userservice

  postgres-3:
    container_name: 'orderservice_postgres'
    image: 'postgres:15'
    env_file:
      - env/postgres.env
    ports:
      - "5435:5432"
    volumes:
      - postgres_data-3:/var/lib/postgresql/data


  authservice:
    image: 'ghcr.io/absolute-in-doubt/authsvc:latest'
    pull_policy: always
    env_file:
      - env/auth.env
      - env/jwks.env
      - env/client-secrets.env
    ports:
      - "8081:8081"
    depends_on:
      - postgres-2

  postgres-2:
    container_name: 'authservice_postgres'
    image: 'postgres:15'
    environment:
      - POSTGRES_DB=auth_service_db
      - POSTGRES_PASSWORD=secret
      - POSTGRES_USER=myuser
    ports:
      - "5434:5432"
    volumes:
      - postgres_data-2:/var/lib/postgresql/data


  userservice:
    image: 'ghcr.io/absolute-in-doubt/usrsvc:latest'
    pull_policy: always
    environment:
      - POSTGRES_URL=jdbc:postgresql://userservice_postgres:5432/user_service_db
      - POSTGRES_PASSWORD=secret
      - POSTGRES_USER=myuser
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWKS_URL=http://authservice:8081/.well-known/jwks.json
    ports:
      - "8080:8080"
    depends_on:
      - postgres-1
      - redis

  postgres-1:
    container_name: 'userservice_postgres'
    image: 'postgres:15'
    environment:
      - POSTGRES_DB=user_service_db
      - POSTGRES_PASSWORD=secret
      - POSTGRES_USER=myuser
    ports:
      - "5433:5432"
    volumes:
      - postgres_data-1:/var/lib/postgresql/data
  redis:
    image: 'redis:latest'
    ports:
      - '6379:6379'
volumes:
  postgres_data-1:
  postgres_data-2:
  postgres_data-3: